<!DOCTYPE html>
<html>
<head>
<title>Test Stream</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.2.2/adapter.min.js"></script>
<script src="https://janus.conf.meetecho.com/janus.js"></script>
</head>
<body>
<div id="stream"></div>
<script type="text/javascript">
var janus;
var streamHandle;
var streamDiv = document.getElementById('stream');

(function init() {
  Janus.init({
    debug: true,
    dependencies: Janus.useDefaultDependencies(),
    callback: function() {
      console.log('janus initialized');
      establish();
    }
  });
})();

function establish() {
  janus = new Janus({
    server: [
      'ws://localhost:8189/',
      'http://localhost:8188/janus'
    ],
    success: function() {
      console.log('janus connection established:', janus.getServer());
      attach();
    },
    error: function(cause) {
      console.error(cause);
    },
    destroyed: function() {
      console.log('destroyed');
    }
  });
}

function attach() {
  const opaqueId = "streamingtest-"+Janus.randomString(12);
  janus.attach({
    plugin: 'janus.plugin.streaming',
    opaqueId: opaqueId,
    success: function(pluginHandle) {
      console.log('attached to streaming plugin with handle:', pluginHandle);
      streamHandle = pluginHandle;

      getStreams();
    },
    error: function(cause) {
      console.error(cause);
    },
    onmessage: function(msg, jsep) {
      if (jsep !== undefined && jsep !== null) {
        console.log('handling sdp:', jsep);
        streamHandle.createAnswer({
          jsep: jsep,
          tracks: [],
          success: function(ourJsep) {
            var body = { request: 'start' };
            streamHandle.send({ message: body, jsep: ourJsep });
          },
          error: function (cause) {
            console.error(cause);
          }
        });
      }
    },
    onremotetrack: function(track, mid, on, metadata) {
      console.log('got remote track:', track);
      console.log('with metadata:', metadata);
      if (track.kind !== 'video') {
        console.log('ignoring non-video track');
        return;
      }
      if (!metadata) {
        console.log('no metadata, ignoring');
        return;
      }
      if (metadata.reason === 'unmute') {
        console.log('unmute');
      } else if (metadata.reason === 'mute') {
        console.log('mute');
        /*
        streamDiv.removeChild(video);
        video.srcObject = null;
        video.remove();
        video = null;
        */
      } else if (metadata.reason === 'created') {
        console.log('created');
        var video = document.createElement('video');
        video.muted = true;
        video.playsinline = true;
        video.autoplay = true;
        streamDiv.appendChild(video);
        let stream = new MediaStream([track]);
        Janus.attachMediaStream(video, stream);
      }
    }
  });
}

function getStreams() {
  console.log('getStreams()');
  var body = { request: 'list' };
  streamHandle.send({
    message: body,
    success: function(response) {
      console.log('stream list response:', response);
      var firstId = response.list[9].id;
      for (var resp of response.list) {
        if (resp.id === 50) {
          startStream(resp.id);
        }
      }
    },
    error: function (cause) {
      console.error(cause);
    }
  });
}

function startStream(id) {
  console.log('starting stream', id);
  var body = { request: 'watch', id: id };
  streamHandle.send({
    message: body,
    error: function (cause) {
      console.error(cause);
    }
  });
}
</script>
</body>
</html>
